# nginx proxy address - http://172.17.0.1:50041


x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

name: postiz
services:
  app:
    image: ghcr.io/gitroomhq/postiz-app:latest
    container_name: postiz-app
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      IS_GENERAL: "true"
      STORAGE_PROVIDER: local
      UPLOAD_DIRECTORY: /uploads
      NEXT_PUBLIC_UPLOAD_DIRECTORY: /uploads
      BACKEND_INTERNAL_URL: http://localhost:3000
      MAIN_URL: https://${BASE_HOST_NAME:-localhost}.${BASE_DOMAIN_NAME:-example.com}
      FRONTEND_URL: https://${BASE_HOST_NAME:-localhost}.${BASE_DOMAIN_NAME:-example.com}
      NEXT_PUBLIC_BACKEND_URL: https://${BASE_HOST_NAME:-localhost}.${BASE_DOMAIN_NAME:-example.com}/api
      JWT_SECRET: ${APP_JWT_TOKEN:-changeme_jwt_secret_min_32_chars}
      DATABASE_URL: postgresql://${DB_USER_NAME:-postiz}:${DB_USER_PASS:-changeme_db_password}@postiz-db:5432/${DB_CREATE_DATABASE_NAME:-postiz}
      REDIS_URL: redis://postiz-redis:6379
      CONTAINER_NAME: postiz-app
      HOSTNAME: ${BASE_HOST_NAME:-$HOSTNAME}
    ports:
      - 172.17.0.1:50041:5000
    volumes:
      - './volumes/config/postiz:/config/'
      - './volumes/data/postiz/uploads:/uploads/'
    depends_on:
      postiz-db:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy
    networks:
      - postiz
      - proxy
      - cloudflare
    labels:
      - 'traefik.enable=true'
      - 'cloudflare.enable=true'
      - 'traefik.docker.network=proxy'
      - 'cloudflare.service=http://postiz-app:5000'
      - 'cloudflare.hostname=postiz.${CLOUDFLARE_ZONE_NAME:-}'
      - 'traefik.http.routers.postiz-app.entrypoints=http'
      - 'traefik.http.routers.postiz-app-secure.tls=true'
      - 'traefik.http.routers.postiz-app.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.middlewares.postiz-app-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.postiz-app.middlewares=postiz-app-https-redirect'
      - 'traefik.http.routers.postiz-app-secure.entrypoints=https'
      - 'traefik.http.routers.postiz-app-secure.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.routers.postiz-app-secure.tls.certresolver=cloudflare'
      - 'traefik.http.routers.postiz-app-secure.service=postiz-app'
      - 'traefik.http.services.postiz-app.loadbalancer.server.port=5000'

  postiz-db:
    image: postgres:latest
    container_name: postiz-db
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      POSTGRES_DB: ${DB_CREATE_DATABASE_NAME:-postiz}
      POSTGRES_USER: ${DB_USER_NAME:-postiz}
      POSTGRES_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
      CONTAINER_NAME: postiz-db
    volumes:
      - './volumes/data/db/postgres/postiz:/var/lib/postgresql/data'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER_NAME:-postiz} -d ${DB_CREATE_DATABASE_NAME:-postiz}"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - postiz

  postiz-redis:
    image: redis:alpine
    container_name: postiz-redis
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      CONTAINER_NAME: postiz-redis
    volumes:
      - './volumes/data/db/redis/postiz:/data'
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - postiz

networks:
  postiz:
    name: postiz
    external: false
  proxy:
    external: true
  cloudflare:
    external: true
